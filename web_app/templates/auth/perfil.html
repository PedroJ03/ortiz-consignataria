{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto py-12 px-4 sm:px-6 lg:px-8 min-h-[80vh]">
    <div class="bg-white shadow sm:rounded-lg overflow-hidden border border-gray-100">
        <div class="px-4 py-5 sm:px-6 bg-brand text-white flex gap-4 items-center">
            <svg class="w-8 h-8 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
            <div>
                <h3 class="text-xl leading-6 font-display font-bold">Mi Perfil</h3>
                <p class="mt-1 max-w-2xl text-sm text-gray-300">Administra tu información personal y contraseña.</p>
            </div>
        </div>

        <form action="{{ url_for('perfil') }}" method="POST" class="p-6 md:p-8 space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Nombre Completo</label>
                    <input type="text" name="nombre" value="{{ user_db['nombre_completo'] }}" required
                        class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-brand focus:border-brand transition">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Correo Electrónico</label>
                    <input type="text" disabled value="{{ user_db['email'] }}"
                        class="w-full px-4 py-2 bg-gray-100 border border-gray-300 text-gray-500 rounded cursor-not-allowed"
                        title="El correo no se puede cambiar">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Teléfono</label>
                    <input type="text" name="telefono" value="{{ user_db['telefono'] }}"
                        placeholder="Ej: +54 9 11 1234 5678"
                        class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-brand focus:border-brand transition">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Ubicación</label>
                    <input type="text" name="ubicacion" value="{{ user_db['ubicacion'] }}" placeholder="Ej: Tandil"
                        class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-brand focus:border-brand transition">
                </div>
            </div>

            <div class="mt-10 border-t pt-8 border-gray-200">
                <h4 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                        </path>
                    </svg>
                    Cambiar Contraseña
                </h4>
                <p class="text-xs text-gray-500 mb-5">Si no deseas cambiarla, deja estos campos en blanco.</p>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Nueva Contraseña</label>
                        <input type="password" name="password" placeholder="••••••••"
                            class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-brand focus:border-brand transition">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Repetir Nueva Contraseña</label>
                        <input type="password" name="confirm_password" placeholder="••••••••"
                            class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-brand focus:border-brand transition">
                    </div>
                </div>
            </div>

            <div class="pt-6 flex justify-end">
                <button type="submit"
                    class="px-6 py-3 bg-accent text-brand font-bold text-sm tracking-wide rounded hover:bg-brand hover:text-white transition-all uppercase shadow-md flex items-center gap-2">
                    Guardar Cambios
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
