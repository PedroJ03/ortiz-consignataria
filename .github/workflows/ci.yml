name: Continuous Integration (CI)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip' # Cache dependencies to speed up subsequent runs

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # We need both application code dependencies and testing tools
        pip install -r requirements_web.txt
        pip install -r requirements_test.txt

    - name: Run Pytest Test Suite
      # Env vars are populated implicitly by mock tests but we ensure TESTING mode natively
      env:
        TESTING: 'true'
        SECRET_KEY: 'ci_dummy_key_ortiz'
      run: |
        pytest tests/ -v
